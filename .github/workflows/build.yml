name: 🚀 Build Gerador Plus APK

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Tipo de build (debug ou release)'
        required: true
        default: 'debug'
        type: choice
        options: [debug, release]

jobs:
  # ──────────────────────────────────────────────────────────────
  # BUILD DEBUG — roda em todo push / PR
  # ──────────────────────────────────────────────────────────────
  build-debug:
    name: 🔨 Build Debug APK
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.build_type == 'debug'

    steps:
      # 1. Clona o repositório
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # 2. Instala JDK 17 (obrigatório para AGP 8+)
      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Instala o Gradle 8.4 diretamente (sem depender do gradlew/JAR local)
      - name: ⚙️ Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
          cache-read-only: false

      # 4. Instala o Android SDK (command-line tools)
      - name: 📱 Setup Android SDK
        uses: android-actions/setup-android@v3

      # 5. Aceita licenças do Android SDK automaticamente
      - name: ✅ Aceitar licenças SDK
        run: yes | sdkmanager --licenses || true

      # 6. Instala build-tools e plataforma necessários
      - name: 🔧 Instalar SDK Components
        run: |
          sdkmanager "platform-tools" \
                     "platforms;android-34" \
                     "build-tools;34.0.0"

      # 7. Injeta a chave TMDB a partir dos Secrets do GitHub
      - name: 🔑 Injetar chave TMDB
        run: |
          echo "TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}" >> local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties

      # 8. Permissão de execução no gradlew
      - name: 🔧 Permissão gradlew
        run: chmod +x gradlew

      # 9. Cache do Gradle (acelera builds futuros)
      - name: 💾 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # 10. Build do APK Debug
      - name: 🏗️ Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      # 11. Faz upload do APK como artefato para download
      - name: 📦 Upload APK Debug
        uses: actions/upload-artifact@v4
        with:
          name: GeradorPlus-Debug-Build${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # 12. Mostra informações do APK gerado
      - name: 📊 Info do APK
        run: |
          echo "=== APK gerado ==="
          find app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;

  # ──────────────────────────────────────────────────────────────
  # BUILD RELEASE — só na branch main ou disparo manual
  # ──────────────────────────────────────────────────────────────
  build-release:
    name: 📦 Build Release APK
    runs-on: ubuntu-latest
    if: >
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release')

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: ⚙️ Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: 📱 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: ✅ Aceitar licenças SDK
        run: yes | sdkmanager --licenses || true

      - name: 🔧 Instalar SDK Components
        run: |
          sdkmanager "platform-tools" \
                     "platforms;android-34" \
                     "build-tools;34.0.0"

      # Injeta TMDB + sdk.dir
      - name: 🔑 Injetar chave TMDB
        run: |
          echo "TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}" >> local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties

      # Se tiver keystore configurado, decodifica e prepara assinatura
      - name: 🔐 Configurar Keystore (se disponível)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks
          cat >> local.properties << EOF
          storeFile=keystore.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: 🔧 Permissão gradlew
        run: chmod +x gradlew

      - name: 💾 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: 🏗️ Build Release APK
        run: gradle assembleRelease --no-daemon --stacktrace
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: 📦 Upload APK Release
        uses: actions/upload-artifact@v4
        with:
          name: GeradorPlus-Release-Build${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 60

      # Cria uma Release oficial no GitHub com o APK anexado
      - name: 🏷️ Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "🎬 Gerador Plus v1.0.${{ github.run_number }}"
          body: |
            ## 🎬 Gerador Plus — Build Automático #${{ github.run_number }}

            ### ✅ Como instalar
            1. Baixe o arquivo `.apk` abaixo
            2. No celular Android, vá em **Configurações → Segurança → Fontes desconhecidas** e ative
            3. Abra o arquivo `.apk` e instale

            ### 📋 Detalhes
            - **Branch:** `${{ github.ref_name }}`
            - **Commit:** `${{ github.sha }}`
            - **Build:** `#${{ github.run_number }}`
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────
  # LINT — verifica erros de código em todo PR
  # ──────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint Check
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: ⚙️ Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: 📱 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: ✅ Aceitar licenças SDK
        run: yes | sdkmanager --licenses || true

      - name: 🔧 Instalar SDK Components
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: 🔑 Injetar placeholders (lint não precisa de chave real)
        run: |
          echo "TMDB_API_KEY=placeholder_for_lint" >> local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties

      - name: 🔧 Permissão gradlew
        run: chmod +x gradlew

      - name: 💾 Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-lint-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}

      - name: 🔍 Rodar Lint
        run: gradle lintDebug --no-daemon
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: 📊 Upload Relatório Lint
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report-${{ github.run_number }}
          path: app/build/reports/lint-results-debug.html
          retention-days: 7
