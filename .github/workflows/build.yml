name: Build Gerador Plus APK

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:

  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Baixar gradle-wrapper.jar oficial
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          ls -lh gradle/wrapper/gradle-wrapper.jar

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Aceitar licencas SDK
        run: yes | sdkmanager --licenses || true

      - name: Instalar plataforma e build-tools
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Criar local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}" >> local.properties

      - name: Permissao gradlew
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build APK Debug
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK Debug
        uses: actions/upload-artifact@v4
        with:
          name: GeradorPlus-Debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30


  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Baixar gradle-wrapper.jar oficial
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          ls -lh gradle/wrapper/gradle-wrapper.jar

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Aceitar licencas SDK
        run: yes | sdkmanager --licenses || true

      - name: Instalar plataforma e build-tools
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Criar local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}" >> local.properties

      - name: Configurar Keystore para assinatura
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > app/keystore.jks
            echo "storeFile=keystore.jks"            >> local.properties
            echo "storePassword=$KEYSTORE_PASSWORD"  >> local.properties
            echo "keyAlias=$KEY_ALIAS"               >> local.properties
            echo "keyPassword=$KEY_PASSWORD"         >> local.properties
            echo "Keystore configurado"
          else
            echo "Sem keystore - build nao assinado"
          fi

      - name: Permissao gradlew
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build APK Release
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK Release
        uses: actions/upload-artifact@v4
        with:
          name: GeradorPlus-Release-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 60

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Gerador Plus v1.0.${{ github.run_number }}
          body: |
            Build automatico gerado pelo GitHub Actions.

            Como instalar:
            1. Baixe o arquivo .apk abaixo
            2. No celular va em Configuracoes > Seguranca > Fontes desconhecidas e ative
            3. Abra o .apk e instale

            Branch: ${{ github.ref_name }}
            Build: ${{ github.run_number }}
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
